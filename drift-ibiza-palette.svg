<svg width="600" height="280" viewBox="0 0 600 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="280" fill="#FFFFFF"/>
  <!-- Titolo -->
  <text x="30" y="36" font-family="Georgia, serif" font-size="18" font-weight="500" fill="#0F0A1E">Drift Ibiza — Brand Colors</text>

  <!-- Swatches riga 1 -->
  <!-- Midnight -->
  <rect x="30" y="56" width="80" height="80" rx="10" fill="#0F0A1E"/>
