  <text x="414" y="166" font-family="Arial, sans-serif" font-size="10" fill="#888780">#C2F227</text>

  <!-- Riga 2 -->
  <!-- Sand -->
  <rect x="30" y="186" width="80" height="56" rx="10" fill="#F5F2ED" stroke="#E0DDD6" stroke-width="1"/>
  <text x="30" y="258" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#0F0A1E">Sand</text>
  <text x="30" y="272" font-family="Arial, sans-serif" font-size="10" fill="#888780">#F5F2ED</text>

